<section class="container admin-page page-enter">
  <h1>إدارة الملف الشخصي</h1>
  <div class="admin-card anim-hover-lift">
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="row g-3">
        <div class="col-md-6">
          <input class="form-control" formControlName="name" placeholder="الاسم" />
        </div>
        <div class="col-md-6">
          <input class="form-control" formControlName="title" placeholder="المسمى الوظيفي" />
        </div>
        <div class="col-md-6">
          <input class="form-control" formControlName="email" placeholder="البريد الإلكتروني" />
        </div>
        <div class="col-md-6">
          <input class="form-control" formControlName="linkedInUrl" placeholder="رابط لينكد إن" />
        </div>
        <div class="col-md-6">
          <input class="form-control" formControlName="gitHubUrl" placeholder="رابط جيت هب" />
        </div>
        <div class="col-md-6">
          <label class="form-label small text-muted mb-1">صورة الملف الشخصي</label>
          <input #profileImageInput class="form-control" type="file" accept="image/*" (change)="onImageSelected($event)" />
          @if (formImageSrc) {
            <div class="image-preview-wrap mt-2">
              <img [src]="formImageSrc" alt="معاينة الصورة" class="image-preview image-preview--round" />
            </div>
          }
        </div>
        <div class="col-12">
          <label class="form-label small text-muted mb-1">السيرة الذاتية (PDF)</label>
          <input #cvInput class="form-control" type="file" accept=".pdf,application/pdf" (change)="onCvSelected($event)" />
          @if (selectedCvFile) {
            <p class="small text-muted mt-1 mb-0">سيتم رفع: {{ selectedCvFile.name }}</p>
          }
          @if (currentResumeHref && !selectedCvFile) {
            <p class="small mt-2 mb-0">
              <a [href]="currentResumeHref" target="_blank" rel="noopener">عرض السيرة الحالية (PDF)</a>
            </p>
          }
        </div>
        <div class="col-12">
          <textarea class="form-control" rows="5" formControlName="bio" placeholder="نبذة تعريفية"></textarea>
        </div>
      </div>
      <button class="btn btn-primary mt-3" type="submit">حفظ</button>
    </form>
  </div>
</section>
