<section class="container admin-page page-enter">
  <h1>إدارة المشاريع</h1>
  <div class="row g-4">
    <div class="col-lg-5">
      <div class="admin-card anim-hover-lift">
        <h4>{{ selectedId ? 'تعديل مشروع' : 'إضافة مشروع' }}</h4>
        <form [formGroup]="form" (ngSubmit)="save()">
          <input class="form-control mb-2" formControlName="title" placeholder="العنوان" />
          <textarea class="form-control mb-2" rows="4" formControlName="description" placeholder="الوصف"></textarea>
          <input class="form-control mb-2" formControlName="gitHubUrl" placeholder="رابط جيت هب" />
          <input class="form-control mb-2" formControlName="demoUrl" placeholder="رابط العرض (Demo)" />
          <label class="form-label small text-muted mb-1">صورة المشروع</label>
          <input #projectImageInput class="form-control mb-2" type="file" accept="image/*" (change)="onImageSelected($event)" />
          @if (formImageSrc) {
            <div class="image-preview-wrap mb-2">
              <img [src]="formImageSrc" alt="معاينة صورة المشروع" class="image-preview" />
            </div>
          }
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" formControlName="isFeatured" id="featuredProject" />
            <label class="form-check-label" for="featuredProject">مشروع مميّز</label>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">{{ selectedId ? 'حفظ التعديل' : 'إضافة' }}</button>
            <button class="btn btn-outline-secondary" type="button" (click)="resetForm()">إعادة تعيين</button>
          </div>
        </form>
      </div>
    </div>
    <div class="col-lg-7">
      <div class="admin-card anim-hover-lift">
        <h4>المشاريع الحالية</h4>
        <div class="table-responsive">
          <table class="table table-dark table-striped align-middle">
            <thead>
              <tr>
                <th>العنوان</th>
                <th>مميّز</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody>
              @for (project of projects; track project.id) {
                <tr>
                  <td>{{ project.title }}</td>
                  <td>{{ project.isFeatured ? 'نعم' : 'لا' }}</td>
                  <td class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-warning" (click)="edit(project)">تعديل</button>
                    <button class="btn btn-sm btn-outline-danger" (click)="deleteProject(project.id)">حذف</button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</section>
