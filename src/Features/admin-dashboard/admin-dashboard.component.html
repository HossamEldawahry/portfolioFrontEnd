<section class="container admin-board">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Admin Dashboard</h1>
    <button class="btn btn-outline-danger" (click)="logout()">Logout</button>
  </div>

  <div class="stats-grid" *ngIf="stats as s">
    <article class="stats-card">
      <h2>{{ s.projectsCount }}</h2>
      <p>Projects</p>
    </article>
    <article class="stats-card">
      <h2>{{ s.skillsCount }}</h2>
      <p>Skills</p>
    </article>
    <article class="stats-card">
      <h2>{{ s.messagesCount }}</h2>
      <p>Messages</p>
    </article>
  </div>

  <div class="stats-grid mt-4">
    <a class="stats-card text-decoration-none text-reset" [routerLink]="['/admin/projects']">
      <h5>المشاريع</h5>
      <p>إضافة / تعديل / حذف / مشاهدة</p>
    </a>
    <a class="stats-card text-decoration-none text-reset" [routerLink]="['/admin/skills']">
      <h5>المهارات</h5>
      <p>إضافة / تعديل / حذف / مشاهدة</p>
    </a>
    <a class="stats-card text-decoration-none text-reset" [routerLink]="['/admin/messages']">
      <h5>الرسائل</h5>
      <p>مشاهدة / تحديث حالة / حذف</p>
    </a>
    <a class="stats-card text-decoration-none text-reset" [routerLink]="['/admin/profile']">
      <h5>الملف الشخصي</h5>
      <p>إنشاء / تعديل</p>
    </a>
  </div>
</section>
