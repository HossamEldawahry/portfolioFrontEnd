<section class="container admin-auth-wrap page-enter">
  <div class="admin-auth-card anim-hover-lift">
    <h1>تسجيل دخول المشرف</h1>
    <p>سجّل الدخول للتحكم في المحتوى وإدارة البورتفوليو.</p>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">اسم المستخدم</label>
        <input class="form-control" formControlName="username" autocomplete="username" />
      </div>
      <div class="mb-4">
        <label class="form-label">كلمة المرور</label>
        <input class="form-control" type="password" formControlName="password" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary w-100" type="submit">دخول</button>
    </form>
  </div>
</section>
