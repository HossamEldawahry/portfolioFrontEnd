<nav dir="rtl" class="navbar navbar-expand-lg nav-shell sticky-top nav-enter">
  <div class="container-fluid container">
    <a class="navbar-brand" [routerLink]="['']">بورتفوليو</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="فتح وإغلاق القائمة">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['']" [routerLinkActive]="['active']">الرئيسية</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['about']" [routerLinkActive]="['active']">حول</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['contact']" [routerLinkActive]="['active']">اتصل بنا</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['projects']" [routerLinkActive]="['active']">المشاريع</a>
        </li>
      </ul>
      <div class="d-flex gap-2 align-items-center flex-wrap">
        @if (profileResumeHref) {
          <a
            class="btn btn-outline-success btn-sm"
            [href]="profileResumeHref"
            download
            target="_blank"
            rel="noopener"
            title="تحميل السيرة الذاتية"
          >
            <i class="bi bi-file-earmark-arrow-down"></i>
            السيرة
          </a>
        } @else {
          <button
            type="button"
            class="btn btn-outline-secondary btn-sm"
            disabled
            title="ارفع السيرة من لوحة التحكم ← الملف الشخصي"
          >
            <i class="bi bi-file-earmark-arrow-down"></i>
            السيرة
          </button>
        }
        @if (isLoggedIn) {
          <div class="dropdown user-menu-root" [class.show]="userMenuOpen">
            <button
              class="btn btn-outline-primary btn-sm user-menu-btn dropdown-toggle"
              type="button"
              [attr.aria-expanded]="userMenuOpen"
              (click)="toggleUserMenu($event)"
            >
              <i class="bi bi-person-circle"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end user-dropdown" [class.show]="userMenuOpen">
              <li>
                <a class="dropdown-item" [routerLink]="['/admin/dashboard']" (click)="closeUserMenu()">الدخول للوحة التحكم</a>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li><button class="dropdown-item text-danger" type="button" (click)="logout()">تسجيل الخروج</button></li>
            </ul>
          </div>
        } @else {
          <a class="btn btn-outline-primary btn-sm" [routerLink]="['/admin/login']">دخول المشرف</a>
        }
        <button class="btn btn-outline-secondary btn-sm" (click)="toggleTheme()"><i class="bi" [ngClass]="currentTheme === 'dark' ? 'bi-sun' : 'bi-moon'"></i></button>
      </div>
    </div>
  </div>
</nav>
